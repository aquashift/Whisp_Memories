name: Sync Copilot Instructions to Public Repo

on:
  push:
    paths:
      - '.github/copilot-instructions.md'

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Ensure file exists
        run: |
          if [ ! -f ".github/copilot-instructions.md" ]; then
            echo "File missing, exiting."
            exit 0
          fi

      - name: Prepare content
        id: prepare
        run: |
          CONTENT_B64=$(base64 -w0 ".github/copilot-instructions.md")
          echo "content_b64=$CONTENT_B64" >> "$GITHUB_OUTPUT"

      - name: Sync to target repo
        env:
          TARGET_REPO: aquashift/copilot-instructions
          TOKEN: ${{ secrets.TARGET_PAT }}
          FILE_PATH: .github/copilot-instructions.md
        run: |
          API_URL="https://api.github.com/repos/$TARGET_REPO/contents/$FILE_PATH"

          EXISTING=$(curl -s \
            -H "Authorization: token $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$API_URL")

          SHA=$(echo "$EXISTING" | jq -r '.sha // empty')

          if [ -n "$SHA" ]; then
            MSG="Update copilot instructions from $GITHUB_REPOSITORY"
            DATA=$(jq -n \
              --arg msg "$MSG" \
              --arg content "${{ steps.prepare.outputs.content_b64 }}" \
              --arg sha "$SHA" \
              '{message:$msg, content:$content, sha:$sha}')
          else
            MSG="Add copilot instructions from $GITHUB_REPOSITORY"
            DATA=$(jq -n \
              --arg msg "$MSG" \
              --arg content "${{ steps.prepare.outputs.content_b64 }}" \
              '{message:$msg, content:$content}')
          fi

          curl -s -X PUT \
            -H "Authorization: token $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -d "$DATA" \
            "$API_URL" | jq .
